<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Glowing background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-gradient)" />
  
  <!-- Outer Ring (System) -->
  <circle cx="100" cy="100" r="70" stroke="url(#ring-gradient)" stroke-width="8" stroke-dasharray="80 20" stroke-linecap="round" />
  <circle cx="100" cy="100" r="50" stroke="url(#ring-gradient)" stroke-width="4" stroke-dasharray="40 10" stroke-linecap="round" opacity="0.5" />

  <!-- Inner Brain/Node structure (AI) -->
  <path d="M100 50 C 70 50, 60 70, 70 90 C 50 90, 50 110, 70 110 C 60 130, 80 140, 100 135 C 120 140, 140 130, 130 110 C 150 110, 150 90, 130 90 C 140 70, 130 50, 100 50 Z" fill="url(#brain-gradient)" />
  
  <!-- Connecting nodes -->
  <circle cx="85" cy="85" r="6" fill="#fff" />
  <circle cx="115" cy="85" r="6" fill="#fff" />
  <circle cx="100" cy="115" r="8" fill="#fff" />
  <path d="M85 85 L100 115 L115 85" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="ring-gradient" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="brain-gradient" x1="50" y1="50" x2="150" y2="150">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>
</svg>
